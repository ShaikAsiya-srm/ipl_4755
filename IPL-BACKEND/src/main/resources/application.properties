# Spring Boot Server Configuration
server.port=8081
server.address=0.0.0.0
server.servlet.context-path=/ipl-backend

# Application Name
spring.application.name=IPL Backend - Spring Boot

# Logging Level
logging.level.root=INFO
logging.level.com.ipl.backend=DEBUG

# H2 Database Configuration (Persistent Development Storage)
# Data is stored in IPL-BACKEND/data/ipldb.mv.db and survives backend restarts.
spring.datasource.url=jdbc:h2:file:./data/ipldb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Error Handling
server.error.include-message=always
server.error.include-stacktrace=on_param
