# Spring Boot Server Configuration
server.port=8081
server.servlet.context-path=/ipl-backend

# Application Name
spring.application.name=IPL Backend - Spring Boot

# Logging Level
logging.level.root=INFO
logging.level.com.ipl.backend=DEBUG

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:ipldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:init.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Error Handling
server.error.include-message=always
server.error.include-stacktrace=on_param
