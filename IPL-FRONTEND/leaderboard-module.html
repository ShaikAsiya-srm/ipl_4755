<!-- Leaderboard Module -->

<!-- Header -->
<div style="background: linear-gradient(135deg, #f97316, #ec4899); border-radius: 24px; padding: 35px 40px; margin-bottom: 30px; box-shadow: 0 15px 50px rgba(249,115,22,0.4);">
    <h2 style="color: white; margin: 0; font-size: 32px; font-weight: 900;">🏆 IPL 2026 Leaderboard</h2>
    <p style="color: rgba(255,255,255,0.9); margin: 10px 0 0; font-size: 16px;">Top predictors competing for glory</p>
</div>

<!-- Top 3 Winners -->
<div id="top3Winners" style="display: flex; justify-content: center; align-items: flex-end; gap: 30px; margin-bottom: 50px;">
    <!-- Dynamically populated -->
</div>

<!-- Your Stats -->
<div style="background: linear-gradient(135deg, #f3e8ff, #ede9fe); border-radius: 20px; padding: 40px; box-shadow: 0 15px 50px rgba(147,51,234,0.2); margin-bottom: 20px;">
    <h3 style="color: #9333ea; margin: 0 0 30px; font-size: 28px; font-weight: 900; text-align: center;">🎯 Your Performance Stats</h3>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px;">
        <div style="text-align: center; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 3px solid #9333ea;">
            <div style="color: #9333ea; font-size: 48px; font-weight: 900;">#4</div>
            <div style="color: #666; font-size: 16px; margin-top: 10px; font-weight: 600;">Current Rank</div>
        </div>
        <div style="text-align: center; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 3px solid #ec4899;">
            <div style="color: #ec4899; font-size: 48px; font-weight: 900;">2,050</div>
            <div style="color: #666; font-size: 16px; margin-top: 10px; font-weight: 600;">Total Points</div>
        </div>
        <div style="text-align: center; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 3px solid #f97316;">
            <div style="color: #f97316; font-size: 48px; font-weight: 900;">20</div>
            <div style="color: #666; font-size: 16px; margin-top: 10px; font-weight: 600;">Predictions Made</div>
        </div>
        <div style="text-align: center; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 3px solid #22c55e;">
            <div style="color: #22c55e; font-size: 48px; font-weight: 900;">65%</div>
            <div style="color: #666; font-size: 16px; margin-top: 10px; font-weight: 600;">Accuracy Rate</div>
        </div>
    </div>
</div>

<!-- Full Leaderboard Table -->
<div style="background: white; border-radius: 20px; padding: 35px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); margin-bottom: 40px;">
    <h3 style="color: #1e293b; margin: 0 0 25px; font-size: 26px; font-weight: 900; text-align: center;">📊 Complete Standings</h3>
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
            <thead>
                <tr style="background: linear-gradient(135deg, #f97316, #ec4899); border-bottom: 3px solid #ec4899;">
                    <th style="padding: 18px; text-align: center; color: white; font-weight: 800;">Rank</th>
                    <th style="padding: 18px; text-align: left; color: white; font-weight: 800;">Predictor</th>
                    <th style="padding: 18px; text-align: center; color: white; font-weight: 800;">Points</th>
                    <th style="padding: 18px; text-align: center; color: white; font-weight: 800;">Predictions</th>
                    <th style="padding: 18px; text-align: center; color: white; font-weight: 800;">Accuracy</th>
                </tr>
            </thead>
            <tbody id="leaderboardList">
                <!-- Data populated via script -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8081/ipl-backend";
    const API_BASE = `${BASE_URL}/api`;

    async function loadLeaderboard() {
        try {
            const url = `${API_BASE}/leaderboard`;
            console.log("Fetching leaderboard from:", url);
            const response = await fetch(url);
            console.log("Leaderboard response:", response.status, response.statusText);
            
            const users = await response.json();
            if (!response.ok) throw new Error(users.error || `HTTP ${response.status}: ${response.statusText}`);
            if (!Array.isArray(users)) throw new Error('Invalid leaderboard response');
            console.log("Leaderboard data:", users);
            renderLeaderboard(users);
        } catch (error) {
            console.error('Error loading leaderboard:', error);
            renderLeaderboard([]);
        }
    }

    function renderLeaderboard(users) {
        const leaderboardList = document.getElementById('leaderboardList');
        if (!leaderboardList) return;
        leaderboardList.innerHTML = '';

        if (!Array.isArray(users) || users.length === 0) {
            leaderboardList.innerHTML = '<tr><td colspan="5" style="padding: 24px; text-align: center; color: #666;">Leaderboard is currently empty.</td></tr>';
            renderTop3Winners([]);
            return;
        }
        
        users.forEach((user, index) => {
            const rank = index + 1;
            const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
            const accuracy = Math.floor(Math.random() * 30) + 70; // Mock accuracy
            const points = Number(user.points ?? user.score ?? 0);
            const totalPredictions = Math.floor(points / 10); // Each prediction = 10 pts
            
            const row = document.createElement('tr');
            row.style.cssText = index < 3 ? 'background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05))' : (index % 2 === 0 ? 'background:#f9f9f9' : 'background:white');
            row.innerHTML = `
                <td style="padding: 18px; text-align: center; font-weight: ${index < 3 ? '900' : '700'}; font-size: ${index < 3 ? '20px' : '16px'}; color: ${index === 0 ? '#ffd700' : (index === 1 ? '#c0c0c0' : (index === 2 ? '#cd7f32' : '#9333ea'))};">${rank}</td>
                <td style="padding: 18px; font-weight: 700; color: #333;">${medal}${user.username}</td>
                <td style="padding: 18px; text-align: center; font-weight: 800; color: #9333ea;">${points.toLocaleString()} pts</td>
                <td style="padding: 18px; text-align: center;">${totalPredictions}</td>
                <td style="padding: 18px; text-align: center; color: ${accuracy >= 70 ? '#22c55e' : '#666'}; font-weight: 700;">${accuracy}%</td>
            `;
            leaderboardList.appendChild(row);
        });

        // Populate top 3 winners section
        renderTop3Winners(users);
    }

    function renderTop3Winners(users) {
        const container = document.getElementById('top3Winners');
        if (!container) return;
        
        container.innerHTML = '';
        
        // Take top 3 users
        const top3 = users.slice(0, 3);
        if (top3.length === 0) return;

        // Order: 2nd, 1st, 3rd for visual centering
        const order = [1, 0, 2]; // index: second, first, third

        order.forEach((idx, visualIdx) => {
            const user = top3[idx];
            if (!user) return;

            const rank = idx + 1;
            const isFirst = rank === 1;
            const points = Number(user.points ?? user.score ?? 0);
            
            // Get initials from username
            const initials = user.username.substring(0, 2).toUpperCase();
            
            // Colors and styling per rank
            const styles = [
                { // 2nd place
                    bg: 'linear-gradient(135deg, #e5e5e5, #d4d4d4)',
                    avatarBg: '#667eea',
                    nameColor: '#333',
                    pointsColor: '#9333ea',
                    transform: 'scale(1)',
                    medal: '🥈'
                },
                { // 1st place
                    bg: 'linear-gradient(135deg, #ffd700, #ffb700)',
                    avatarBg: 'linear-gradient(135deg, #ec4899, #db2777)',
                    nameColor: '#333',
                    pointsColor: '#9333ea',
                    transform: 'scale(1.1)',
                    medal: '🥇'
                },
                { // 3rd place
                    bg: 'linear-gradient(135deg, #cd7f32, #b87333)',
                    avatarBg: '#10b981',
                    nameColor: '#333',
                    pointsColor: '#ec4899',
                    transform: 'scale(1)',
                    medal: '🥉'
                }
            ];
            
            const style = styles[rank - 1];
            
            const card = document.createElement('div');
            card.style.cssText = `background: ${style.bg}; border-radius: 20px; padding: ${isFirst ? '35px 30px' : '30px 25px'}; text-align: center; box-shadow: 0 15px 45px rgba(0,0,0,0.2); transform: ${style.transform};`;
            
            card.innerHTML = `
                <div style="width: 60px; height: 60px; border-radius: 50%; background: ${rank === 2 ? 'linear-gradient(135deg, #c0c0c0, #a0a0a0)' : 'transparent'}; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 28px;">${style.medal}</div>
                <div style="width: ${isFirst ? '90' : '70'}px; height: ${isFirst ? '90' : '70'}px; border-radius: 50%; background: ${style.avatarBg}; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; box-shadow: ${isFirst ? '0 8px 25px rgba(236,72,153,0.5)' : 'none'};">
                    <span style="color: white; font-weight: bold; font-size: ${isFirst ? '28' : '24'}px;">${initials}</span>
                </div>
                <div style="color: ${style.nameColor}; font-weight: 800; font-size: ${isFirst ? '22' : '18'}px;">${user.username}</div>
                <div style="color: ${style.pointsColor}; font-size: ${isFirst ? '32' : '24'}px; font-weight: 900; margin: 10px 0;">${points.toLocaleString()} pts</div>
                <div style="color: #666; font-size: 13px;">${Math.floor(Math.random()*30+70)}% accuracy</div>
            `;
            
            container.appendChild(card);
        });
    }

    // Auto-load on page render
    loadLeaderboard();
</script>
