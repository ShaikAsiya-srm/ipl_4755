<script>
    async function loadLeaderboard() {
        try {
            const response = await fetch(`${API_BASE}/users`);
            if (!response.ok) throw new Error('Failed to fetch users');
            const users = await response.json();
            users.sort((a, b) => b.points - a.points);
            renderLeaderboard(users);
        } catch (error) {
            console.error('Error loading leaderboard:', error);
        }
    }

    function renderLeaderboard(users) {
        const leaderboardList = document.getElementById('leaderboardList');
        if (!leaderboardList) return;
        leaderboardList.innerHTML = '';
        
        users.forEach((user, index) => {
            const accuracy = user.predictions > 0 ? ((user.correctPredictions / user.predictions) * 100).toFixed(1) : 0;
            const row = document.createElement('tr');
            row.style.cssText = index < 3 ? 'background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05))' : (index % 2 === 0 ? 'background:#f9f9f9' : 'background:white');
            row.innerHTML = `
                <td style="padding: 18px; text-align: center; font-weight: ${index < 3 ? '900' : '700'}; font-size: ${index < 3 ? '20px' : '16px'}; color: ${index === 0 ? '#ffd700' : (index === 1 ? '#c0c0c0' : (index === 2 ? '#cd7f32' : '#9333ea'))};">${index + 1}</td>
                <td style="padding: 18px; font-weight: 700; color: #333;">${index === 0 ? '🏆 ' : (index === 1 ? '🥈 ' : (index === 2 ? '🥉 ' : ''))}${user.username}</td>
                <td style="padding: 18px; text-align: center; font-weight: 800; color: #9333ea;">${user.points}</td>
                <td style="padding: 18px; text-align: center;">${user.predictions || 0}</td>
                <td style="padding: 18px; text-align: center; color: ${accuracy >= 70 ? '#22c55e' : '#666'}; font-weight: 700;">${accuracy}%</td>
            `;
            leaderboardList.appendChild(row);
        });
    }
</script>
