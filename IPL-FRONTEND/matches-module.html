<!-- Matches Module -->

<!-- Header -->
<div style="background: linear-gradient(135deg, #ec4899, #c084fc); border-radius: 24px; padding: 35px 40px; margin-bottom: 30px; box-shadow: 0 15px 50px rgba(236, 72, 153, 0.4);">
    <h2 style="color: white; margin: 0; font-size: 32px; font-weight: 900;">🏏 IPL 2026 Match Schedule</h2>
    <p style="color: rgba(255,255,255,0.9); margin: 10px 0 0; font-size: 16px;">All match schedules, results & venue details</p>
</div>

<!-- Filter Buttons -->
<div style="display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
    <button style="background: linear-gradient(135deg, #9333ea, #c084fc); color: white; border: none; padding: 14px 30px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 25px rgba(147,51,234,0.5);">All Matches</button>
    <button style="background: white; color: #9333ea; border: 3px solid #9333ea; padding: 11px 30px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer;">Completed</button>
    <button style="background: white; color: #9333ea; border: 3px solid #9333ea; padding: 11px 30px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer;">Upcoming</button>
    <button style="background: white; color: #9333ea; border: 3px solid #9333ea; padding: 11px 30px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer;">Live</button>
</div>

<!-- Predictions Hub -->
<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-bottom: 40px;">
    <!-- Expert Prediction Card -->
    <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1);">
        <h3 style="color: #1e293b; margin: 0 0 20px; font-size: 22px; font-weight: 800;">🔮 Expert Predictions</h3>
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
            <div style="width: 60px; height: 60px; border-radius: 50%; background: #d92b2b; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 900;">RCB</div>
            <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-weight: 700; color: #334155;">RCB Win Chance</span>
                    <span style="font-weight: 800; color: #d32f2f;">65%</span>
                </div>
                <div style="width: 100%; height: 10px; background: #f1f5f9; border-radius: 10px; overflow: hidden;">
                    <div style="width: 65%; height: 100%; background: #d32f2f; border-radius: 10px;"></div>
                </div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="width: 60px; height: 60px; border-radius: 50%; background: #3c2253; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 900;">KKR</div>
            <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-weight: 700; color: #334155;">KKR Win Chance</span>
                    <span style="font-weight: 800; color: #7b1fa2;">35%</span>
                </div>
                <div style="width: 100%; height: 10px; background: #f1f5f9; border-radius: 10px; overflow: hidden;">
                    <div style="width: 35%; height: 100%; background: #7b1fa2; border-radius: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Predict & Win Card -->
    <div style="background: linear-gradient(135deg, #1e1b4b, #312e81); border-radius: 20px; padding: 30px; box-shadow: 0 15px 50px rgba(30, 27, 75, 0.3); color: white;">
        <h3 style="color: white; margin: 0 0 10px; font-size: 22px; font-weight: 800;">🎯 Predict & Win</h3>
        <p style="opacity: 0.8; font-size: 14px; margin-bottom: 20px;">Answer all questions correctly to earn maximum points!</p>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <select id="predMatchSelect" onchange="updatePredictionTeams()" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
                <option value="" style="color: black;">Select a Match</option>
            </select>
            
            <select id="predWinner" onchange="updatePotentialPoints()" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
                <option value="" style="color: black;">Who will win the match?</option>
            </select>
            
            <select id="predTossWinner" onchange="updatePotentialPoints()" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
                <option value="" style="color: black;">Who will win the toss?</option>
            </select>
            
            <select id="predBatFirst" onchange="updatePotentialPoints()" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
                <option value="" style="color: black;">Who will bat first?</option>
            </select>
            
            <input type="text" id="predPlayer" oninput="updatePotentialPoints()" placeholder="Man of the Match Player" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
            
            <input type="text" id="predTopScorer" oninput="updatePotentialPoints()" placeholder="Top Run Scorer (Player Name)" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
            
            <input type="text" id="predTopBowler" oninput="updatePotentialPoints()" placeholder="Top Wicket Taker (Player Name)" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
            
            <select id="predTotalSixes" onchange="updatePotentialPoints()" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
                <option value="" style="color: black;">Total Sixes in Match</option>
                <option value="0-10" style="color: black;">0-10</option>
                <option value="11-20" style="color: black;">11-20</option>
                <option value="21-30" style="color: black;">21-30</option>
                <option value="30+" style="color: black;">30+</option>
            </select>
            
            <select id="predTotalRuns" onchange="updatePotentialPoints()" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px;">
                <option value="" style="color: black;">Total Runs (Both Teams)</option>
                <option value="200-250" style="color: black;">200-250</option>
                <option value="251-300" style="color: black;">251-300</option>
                <option value="301-350" style="color: black;">301-350</option>
                <option value="350+" style="color: black;">350+</option>
            </select>
            
            <select id="predMatchWinner" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 14px; display: none;">
                <option value="" style="color: black;">Match Winner</option>
            </select>
        </div>
        
        <div style="background: rgba(250, 204, 21, 0.15); padding: 12px; border-radius: 10px; margin-top: 15px; border: 1px solid rgba(250, 204, 21, 0.3);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px; font-weight: 700;">Potential Points:</span>
                <span id="potentialPoints" style="color: #facc15; font-size: 18px; font-weight: 900;">0 pts</span>
            </div>
        </div>
        
        <button onclick="submitPrediction()" style="width: 100%; background: linear-gradient(135deg, #facc15, #eab308); color: #1e1b4b; border: none; padding: 16px; border-radius: 12px; margin-top: 15px; font-weight: 800; cursor: pointer; font-size: 16px; box-shadow: 0 8px 20px rgba(250, 204, 21, 0.3);">🚀 Submit All Predictions</button>
    </div>
</div>

<!-- Points Table -->
<div style="background: white; border-radius: 20px; padding: 35px; box-shadow: 0 15px 50px rgba(0,0,0,0.05); margin-bottom: 30px;">
    <h3 style="color: #1e293b; margin: 0 0 25px; font-size: 26px; font-weight: 900; text-align: center;">📊 League Standings</h3>
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
            <thead>
                <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                    <th style="padding: 18px; text-align: center; color: #64748b; font-weight: 800;">Pos</th>
                    <th style="padding: 18px; text-align: left; color: #64748b; font-weight: 800;">Team</th>
                    <th style="padding: 18px; text-align: center; color: #64748b; font-weight: 800;">P</th>
                    <th style="padding: 18px; text-align: center; color: #64748b; font-weight: 800;">W</th>
                    <th style="padding: 18px; text-align: center; color: #64748b; font-weight: 800;">L</th>
                    <th style="padding: 18px; text-align: center; color: #64748b; font-weight: 800;">Pts</th>
                    <th style="padding: 18px; text-align: center; color: #64748b; font-weight: 800;">NRR</th>
                </tr>
            </thead>
            <tbody id="pointsTable">
                <!-- Data populated via script -->
            </tbody>
        </table>
    </div>
</div>



<script>
    // Matches Module Functions
    const BASE_URL = "http://localhost:8081/ipl-backend";
    const teamLogos = {
        'Royal Challengers Bangalore': 'RCB',
        'Kolkata Knight Riders': 'KKR',
        'Gujarat Titans': 'GT',
        'Sunrisers Hyderabad': 'SRH',
        'Delhi Capitals': 'DC',
        'Mumbai Indians': 'MI',
        'Punjab Kings': 'PBKS',
        'Chennai Super Kings': 'CSK',
        'Rajasthan Royals': 'RR',
        'Lucknow Super Giants': 'LSG'
    };
    
    const teamColors = {
        'RCB': '#d92b2b', 'KKR': '#3c2253', 'GT': '#1e1e2e', 'SRH': '#e43c40',
        'DC': '#17449b', 'MI': '#004ba0', 'PBKS': '#ed1c24', 'CSK': '#fdb913',
        'RR': '#c83830', 'LSG': '#0f1731'
    };



    // Store loaded matches for prediction form
    let dbMatches = [];

    async function loadMatchesForPrediction() {
        try {
            const url = `${BASE_URL}/api/matches`;
            console.log("Fetching matches from:", url);
            const response = await fetch(url);
            console.log("Matches response:", response.status, response.statusText);
            
            if (response.ok) {
                dbMatches = await response.json();
                console.log("Matches loaded:", dbMatches.length, dbMatches);
                const select = document.getElementById('predMatchSelect');
                select.innerHTML = '<option value="" style="color: black;">Select a Match</option>';
                
                dbMatches.forEach(match => {
                    const option = document.createElement('option');
                    option.value = match.id;
                    option.style.color = "black";
                    option.textContent = `${match.team1} vs ${match.team2} (${match.date || 'TBD'})`;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Error loading matches for prediction:', error);
        }
    }

    function updatePredictionTeams() {
        const select = document.getElementById('predMatchSelect');
        const matchId = select.value;
        const tossSelect = document.getElementById('predTossWinner');
        const batSelect = document.getElementById('predBatFirst');
        const winnerSelect = document.getElementById('predWinner');
        
        tossSelect.innerHTML = '<option value="" style="color: black;">Who will win the toss?</option>';
        batSelect.innerHTML = '<option value="" style="color: black;">Who will bat first?</option>';
        winnerSelect.innerHTML = '<option value="" style="color: black;">Who will win the match?</option>';
        
        if (matchId) {
            const match = dbMatches.find(m => m.id == matchId);
            if (match) {
                [match.team1, match.team2].forEach(team => {
                    const tOpt = document.createElement('option');
                    tOpt.value = team;
                    tOpt.style.color = "black";
                    tOpt.textContent = team;
                    tossSelect.appendChild(tOpt);
                    
                    const bOpt = document.createElement('option');
                    bOpt.value = team;
                    bOpt.style.color = "black";
                    bOpt.textContent = team;
                    batSelect.appendChild(bOpt);
                    
                    const wOpt = document.createElement('option');
                    wOpt.value = team;
                    wOpt.style.color = "black";
                    wOpt.textContent = team;
                    winnerSelect.appendChild(wOpt);
                });
            }
        }
        updatePotentialPoints();
    }

    function updatePotentialPoints() {
        const fields = [
            'predMatchSelect', 'predWinner', 'predTossWinner', 
            'predBatFirst', 'predPlayer', 'predTopScorer', 
            'predTopBowler', 'predTotalSixes', 'predTotalRuns'
        ];
        let filled = 0;
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (el && el.value) filled++;
        });
        const points = filled * 10;
        const ptsEl = document.getElementById('potentialPoints');
        if (ptsEl) ptsEl.textContent = points + ' pts';
    }

    async function submitPrediction() {
        const matchId = document.getElementById('predMatchSelect').value;
        const winner = document.getElementById('predWinner').value;
        const tossWinner = document.getElementById('predTossWinner').value;
        const batFirst = document.getElementById('predBatFirst').value;
        const player = document.getElementById('predPlayer').value;
        const topScorer = document.getElementById('predTopScorer').value;
        const topBowler = document.getElementById('predTopBowler').value;
        const totalSixes = document.getElementById('predTotalSixes').value;
        const totalRuns = document.getElementById('predTotalRuns').value;
        
        if (!matchId || !winner || !tossWinner || !batFirst || !player) {
            alert('Please fill in all required prediction fields!');
            return;
        }

        // Use logged in user
        if (!window.currentUser) {
            alert('Please login to submit prediction');
            openLoginModal();
            return;
        }
        const userId = window.currentUser.id;

        const prediction = {
            userId: userId,
            matchId: parseInt(matchId),
            tossWinner: tossWinner,
            batFirst: batFirst,
            player: player,
            winner: document.getElementById('predWinner').value,
            predictedTeam: document.getElementById('predWinner').value,
            topScorer: document.getElementById('predTopScorer').value,
            topBowler: document.getElementById('predTopBowler').value,
            totalSixes: document.getElementById('predTotalSixes').value,
            totalRuns: document.getElementById('predTotalRuns').value
        };

        try {
            const response = await fetch(`${BASE_URL}/api/predictions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(prediction)
            });
            const result = await response.json().catch(() => ({}));

            if (response.ok) {
                alert('🎉 All predictions submitted successfully! You earned points for each correct prediction.');
                // Clear form
                document.getElementById('predMatchSelect').value = '';
                document.getElementById('predWinner').innerHTML = '<option value="" style="color: black;">Who will win the match?</option>';
                document.getElementById('predTossWinner').innerHTML = '<option value="" style="color: black;">Who will win the toss?</option>';
                document.getElementById('predBatFirst').innerHTML = '<option value="" style="color: black;">Who will bat first?</option>';
                document.getElementById('predPlayer').value = '';
                document.getElementById('predTopScorer').value = '';
                document.getElementById('predTopBowler').value = '';
                document.getElementById('predTotalSixes').value = '';
                document.getElementById('predTotalRuns').value = '';
                updatePotentialPoints();
            } else {
                throw new Error(result.error || 'Submission failed');
            }
        } catch (error) {
            console.error('Prediction error:', error);
            alert(error.message || 'Unable to submit prediction. Please try again.');
        }
    }

    // Add pulse animation
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.9; }
            70% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.9; }
        }
    `;
    document.head.appendChild(style);

    // Initial Load
    loadMatchesForPrediction();
    
    // Check session
    async function checkSession() {
        try {
            const response = await fetch(`${BASE_URL}/api/auth`, { credentials: 'include' });
            if (response.ok) {
                const user = await response.json();
                window.currentUser = user;
                console.log("Session user:", user);
            } else {
                window.currentUser = null;
            }
        } catch (e) {
            window.currentUser = null;
        }
    }
    checkSession();
</script>
